# Fineract 金融核心系统 Skill 优化项目（稳定版配置，对齐论文推荐）
# 使用方法: skill-lab run all --config-path config.yaml
# 续训:     skill-lab resume --config-path config.yaml --run-id <run_id>
# 生效配置: skill-lab config --config-path config.yaml

settings:
  code_graph:
    max_leaf_tokens: 8000
    max_module_depth: 3
    tokenizer: cl100k_base
    split_strategy: file_then_function
    max_components_per_group: 200
    llm_clustering_enabled: false
    use_cache: true
    # max_components_per_llm_call: 50   # reserved / design doc only — NOT wired in src

  document_normalizer:
    max_chunk_tokens: 2000
    ocr_engine: tesseract
    ocr_languages: chi_sim+eng
    ocr_confidence_threshold: 0.6

  atom_extractor:
    atom_policy: atom_policy.yaml
    confidence_tier_1_max: 0.95
    llm_adjustment: 0.05
    max_source_refs_per_atom: 24   # 显式测试 M3 source_refs cap / artifact_quality

  skillopt:
    use_llm_rollout: true     # 训练/评估 rollout 使用 target LLM（论文默认）
    rollout_backend: null
    optimizer_backend: null
    judge_backend: null
    # rollout_backend: qwen-local   # 覆盖 routes.target，为 rollout 指定独立 LLM
    # optimizer_backend: deepseek   # 覆盖 routes.optimizer
    num_epochs: 5           # 完整集先跑 2 轮验证；充分训练可改回 5
    batch_size: 5           # 完整集 train=15，每 step 5 条
    edit_budget: 4          # 论文推荐 L=4
    budget_strategy: cosine # 论文消融：cosine/constant 均优于无 budget
    gate_metric: mixed      # 验证规则沉淀时用 hard+soft；严格评测可改回 hard
    patience: 10
    accumulation: 1
    enable_slow_update: true
    enable_meta_skill: true
    slow_update_gate: true  # slow update 须经 selection gate（论文默认）
    enable_code_tools: true
    max_tool_rounds: 5
    rollout_max_tool_rounds: 5
    rollout_workers: 8
    expose_expected_checks_to_target: false
    check_aliases:
      资产: ["设备资产", "固定资产", "固定资产科目"]
      费用: ["Fee", "手续费", "费用收入", "fee"]
      Charge: ["Client charge", "Fee charge", "charge", "客户费用"]
    gate:
      strict_best_monotonic: true
      knowledge_updates_current_only: true
    finalize:
      export_current_on_tie: false
    quality_gate:
      enabled: true
      reject_on_leakage: true
      sanitize_then_reevaluate: true
      max_skill_tokens: 2000
      max_rules: 40
      benchmark_id_patterns:
        - "\\bjv_[a-z0-9_]+\\b"
    observability:
      write_selection_eval_report: true
      write_skill_quality_report: true
      write_gate_decision_report: true
      write_run_quality_report: true
    output_hygiene:
      enabled: true
      retry_on_prompt_echo: true
      hard_fail_on_persistent_echo: true
    code_diagnosis:
      enabled: true
      max_context_files: 2
      max_snippet_chars: 800
      max_cases_per_step: 8
      write_jsonl: true
      require_code_facts_for_rules: false
    warm_start:
      from_best_skill: ""
    rule_bank:
      enabled: true
      path: demo-project/rule_bank/rules.jsonl
      max_active_rules: 20
      min_support_count: 1
      min_support_score: 0.55
      exclude_regressed: true
      write_back: true
    replay_gate:
      enabled: true
      pool_max_items: 12
      min_hard_pass_rate: 1.0
      reject_on_prompt_echo: true
      reject_on_regression: true
      on_regression: reject
      include_rule_exemplars: true
      include_prompt_echo_cases: true
      external_pool_paths: []
      pool_path: ""
    token_budgets:
      rollout: 8192
      reflect_failure: 16384
      reflect_success: 4096
      reflect_retry: [32768, 65536]
      select_edits: 4096
      judge: 4096
      aggregate: 4096
      slow_update: 4096
      meta_skill: 2048
      atom_extract: 8192

  # M4 自进化 self_evolution（默认关闭；--trace-merge 或 --self-evolve 启用）
  self_evolution:
    enabled: true
    trace_pool:
      enabled: true
      min_support_count: 2
      cluster_by: ["task_type", "missed_checks", "context_refs"]
    proposals:
      include_success: true
      include_failure: true
      hierarchical_merge: true
      max_merge_fan_in: 8
      success_ignore_checks:
        - 会计凭证
        - 借
        - 贷
        - 借贷校验
        - 借贷平衡
      success_default_checks_text: 业务科目、输入金额、借贷平衡
      success_rule_tail: 金额只取用户输入，并输出借贷平衡检查
    gate:
      strict_improvement: false  # 允许 selection hard 持平但 soft/train 改善的规则进入 skill
      reject_ties: false
      allowed_regressions: 0
      frontier_enabled: false
      frontier_size: 3
    edits:
      max_edits_per_step: null
      max_new_rules_per_step: 2
      max_skill_tokens: 2000
    hygiene:
      enabled: true
      run_each_epoch: true
      min_rule_use_count: 1
      max_rules: 40
    attribution:
      enabled: true
      inject_rule_ids: true
    knowledge:
      enabled: true
      gate_tolerance: 0.05
      min_support_count: 2

  # 本配置用于验证端到端优化效果：即使已有 initial_skill + benchmark，也默认跑 M3，
  # 这样能测到 artifact_quality、source_refs cap、context_refs 等代码证据产物。
  pipeline:
    write_artifact_contract: true
    validate_context_refs: true
    run_atoms_when_benchmark_present: true
    run_docs_when_atoms_skipped: false
    merge_atom_seeds_into_benchmark: false
    append_atom_rules_to_skill: true
    bootstrap_min_confidence: 0.9
    atom_rule_include_keywords:
      - 会计
      - 凭证
      - 科目
      - 借方
      - 贷方
      - 借贷
      - 金额
      - 透支
      - 手续费
      - 逾期费
      - 罚款
      - Charge
      - loan
      - savings
      - journal
      - transaction
      - accounting
      - ledger
      - account
      - overdraft
      - fee
      - penalty
      - repayment
      - disbursement
      - accrual
      - LoanTransactionDTO
      - SavingsAccountTransactionDTO
    atom_rule_exclude_keywords:
      - command handler
      - constructor injection
      - "@Service"
      - 状态变更
      - 审计日志
    use_evidence_index: true
    use_entrypoints: true
    use_role_index: true
    auto_plot_training_curve: true

  model_provider:
    backends:
      deepseek:
        type: llm_api
        provider: openai_compatible
        base_url: ${DEEPSEEK_BASE_URL}
        api_key_env: DEEPSEEK_API_KEY
        model: deepseek-v4-pro
        context_window: 1000000
        max_output_tokens: 384000
        timeout_seconds: 180

      deepseek-flash:
        type: llm_api
        provider: openai_compatible
        base_url: ${DEEPSEEK_BASE_URL}
        api_key_env: DEEPSEEK_API_KEY
        model: deepseek-v4-flash
        context_window: 1000000
        max_output_tokens: 384000
        timeout_seconds: 180

      qwen-local:
        type: local_llm
        provider: openai_compatible
        base_url: http://127.0.0.1:8000/v1
        api_key_env: LOCAL_LLM_API_KEY
        model: Qwen/Qwen3.5-4B
        context_window: 32768
        timeout_seconds: 120

      mock-backend:
        type: mock
        provider: mock
        model: mock-model-v1

    # routes：按调用角色（role）选择 backend；primary 失败时按 fallback 顺序降级。
    # 本文件未写 skillopt.rollout_backend 时，rollout 使用 target.primary（deepseek-flash）。
    routes:
      # M3 Atom 抽取：从代码片段与文档块中识别 SkillAtom
      extractor:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      # M1 代码图谱：LLM 辅助模块聚类（llm_clustering_enabled=true 时）
      clusterer:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      # M4 优化器：reflect / select / aggregate / slow-update / meta-skill（强模型）
      optimizer:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      # M4 执行端 rollout：train/selection/test benchmark 答题（量大，用 flash 降本提速）
      target:
        primary: deepseek-flash
        fallback: [qwen-local, mock-backend]
      # 可选 LLM Judge：benchmark scorer=llm_judge 时的 rubric 打分
      judge:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      # 预留：外部 Agent CLI 任务（当前 Fineract 流水线未默认启用）
      agent_worker:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      # 未匹配 role 时的兜底
      default:
        primary: deepseek
        fallback: [qwen-local, mock-backend]

    policies:
      default_retries: 1
      retry_backoff: exponential
      trace_enabled: true
      cache_enabled: false
      redact_secrets: true
      max_cost_per_run_usd: 0
      max_timeout_seconds: 900
      structured_output_fallback: true

  output:
    root: demo-project/runs/
    publish_target: ~/.codex/skills/fineract-agent

  approvals:
    require_for:
      - invoke_agent_cli_with_workspace_write
      - publish_skill
    auto_approve_in_batch: false

project:
  name: fineract-finance-skill
  domain: fintech
  description: "Apache Fineract 金融核心系统 Agent Skill——贷款/储蓄/会计/费用/互操作"

  initial_skill: demo-project/initial_skill.md
  benchmark: demo-project/benchmarks/fineract      # 完整集 15/22/8
  # benchmark: demo-project/benchmarks/fineract-fast # 快速冒烟 5/6/3
  # benchmark: demo-project/benchmarks/fineract-full # 与 fineract 相同（备份）

  graph_role_hints: {}
  reflect_prompts: {}

  code_graph:
    custom_patterns:
      fineract:
        CommandHandler: command_handler
        ReadPlatformService: read_service
        WritePlatformService: write_service
        AccountingProcessor: accounting_processor
        ApiResource: api_resource
    context_ref_path_rules: []

  sources:
    repos:
      - id: fineract
        path: demo-project/sources/repos/fineract
        ref: develop
        include:
          - "fineract-provider/src/main/java/org/apache/fineract/accounting/**"
          - "fineract-provider/src/main/java/org/apache/fineract/portfolio/loanaccount/**"
          - "fineract-provider/src/main/java/org/apache/fineract/portfolio/savings/**"
          - "fineract-provider/src/main/java/org/apache/fineract/portfolio/paymenttype/**"
          - "fineract-provider/src/main/java/org/apache/fineract/portfolio/charge/**"
          - "fineract-provider/src/main/java/org/apache/fineract/interoperation/**"
        exclude:
          - "**/test/**"
          - "**/integration-tests/**"
          - "**/target/**"
        framework_patterns: {}

    docs:
      - id: fineract-readme
        path: demo-project/sources/docs/fineract/README.md
        provider: local_file
        type: markdown
        version: develop
        authority: official_doc
        domain_tags: [fineract, architecture, setup]
        ocr_enabled: false
      - id: fineract-contrib
        path: demo-project/sources/docs/fineract/CONTRIBUTING.md
        provider: local_file
        type: markdown
        version: develop
        authority: official_doc
        domain_tags: [fineract, guidelines, contribution]
        ocr_enabled: false
