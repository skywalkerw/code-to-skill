# Fineract 金融核心系统 Skill 优化项目
# 使用方法: skill-lab run all --config-path config.test.yaml

settings:
  code_graph:
    max_leaf_tokens: 8000
    max_module_depth: 3
    tokenizer: cl100k_base
    split_strategy: file_then_function
    max_components_per_group: 200
    max_components_per_llm_call: 50
    llm_clustering_enabled: false

  document_normalizer:
    ocr_engine: tesseract
    ocr_languages: chi_sim+eng
    ocr_confidence_threshold: 0.6
    chunk_max_tokens: 2000

  atom_extractor:
    atom_policy: atom_policy.yaml
    confidence_tier_1_max: 0.95
    llm_adjustment: 0.05

  skillopt:
    num_epochs: 3
    batch_size: 20
    edit_budget: 3
    gate_metric: soft
    use_slow_update: false
    use_meta_skill: false
    enable_code_tools: true
    max_tool_rounds: 5          # reflect 阶段工具轮次
    rollout_max_tool_rounds: 2  # rollout 阶段限制查代码，优先输出凭证
    # 各阶段 LLM 输出 token 预算（须 ≤ backend.max_output_tokens）
    token_budgets:
      rollout: 8192
      reflect_failure: 16384
      reflect_success: 4096
      reflect_retry: [32768, 65536]
      select_edits: 4096
      judge: 4096
      aggregate: 4096
      slow_update: 4096
      meta_skill: 2048
      atom_extract: 8192

  model_provider:
    backends:
      # 生产级 LLM
      deepseek:
        type: llm_api
        provider: openai_compatible
        base_url: ${DEEPSEEK_BASE_URL}
        api_key_env: ${DEEPSEEK_API_KEY}
        model: deepseek-v4-pro
        context_window: 1000000      # 1M 上下文
        max_output_tokens: 384000    # 最大 384K 输出
        timeout_seconds: 180

      # 本地开发 LLM（vLLM / Ollama）
      qwen-local:
        type: local_llm
        provider: openai_compatible
        base_url: http://127.0.0.1:8000/v1
        api_key_env: LOCAL_LLM_API_KEY
        model: Qwen/Qwen3.5-4B
        context_window: 32768
        timeout_seconds: 120

      # 测试桩（离线 / CI / 无 API key 环境）
      mock-backend:
        type: mock
        provider: mock
        model: mock-model-v1

    routes:
      extractor:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      clusterer:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      optimizer:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      target:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      judge:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      agent_worker:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      default:
        primary: deepseek
        fallback: [qwen-local, mock-backend]

    policies:
      default_retries: 1
      trace_enabled: true
      max_cost_per_run_usd: 0

  output:
    root: test-data/runs/
    publish_target: ~/.codex/skills/fineract-agent

  approvals:
    require_for:
      - invoke_agent_cli_with_workspace_write
      - publish_skill
    auto_approve_in_batch: false

project:
  name: fineract-finance-skill
  domain: fintech
  description: "Apache Fineract 金融核心系统 Agent Skill——贷款/储蓄/会计/费用/互操作"

  # 初始 Skill（如果指定，跳过 M3 自动生成）
  initial_skill: test-data/initial_skill.md

  # Benchmark 目录（如果指定，跳过 M3 自动生成 benchmark_seeds）
  benchmark: test-data/benchmarks/fineract

  sources:
    repos:
      - id: fineract
        path: test-data/sources/repos/fineract
        ref: develop
        include:
          - "fineract-provider/src/main/java/org/apache/fineract/accounting/**"
          - "fineract-provider/src/main/java/org/apache/fineract/portfolio/loanaccount/**"
          - "fineract-provider/src/main/java/org/apache/fineract/portfolio/savings/**"
          - "fineract-provider/src/main/java/org/apache/fineract/portfolio/paymenttype/**"
          - "fineract-provider/src/main/java/org/apache/fineract/portfolio/charge/**"
          - "fineract-provider/src/main/java/org/apache/fineract/interoperation/**"
        exclude:
          - "**/test/**"
          - "**/integration-tests/**"
          - "**/target/**"

    docs:
      - id: fineract-readme
        path: test-data/sources/docs/fineract/README.md
        provider: local_file
        type: markdown
        version: develop
        authority: official_doc
        domain_tags: [fineract, architecture, setup]
      - id: fineract-contrib
        path: test-data/sources/docs/fineract/CONTRIBUTING.md
        provider: local_file
        type: markdown
        version: develop
        authority: official_doc
        domain_tags: [fineract, guidelines, contribution]
