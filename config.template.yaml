# =============================================================================
# code-to-skill 配置文件参考（config.template.yaml）
# =============================================================================
# 完整枚举所有已接线配置键及代码默认值（空 `{}` / `[]` / `""` / `null` 表示可选或未设置）。
# 复制为 config.yaml 后按项目填写；环境变量通过 ${VAR_NAME} 内联引用。
#
# 查看实际生效的已接线项：skill-lab config --config-path config.yaml
# （输出 Effective settings (wired to CLI/modules) 段）
#
# 两个顶层段：
#   settings    框架自身配置（控制 code-to-skill 如何工作）
#   project     目标项目配置（要处理哪个项目的代码/文档）
# =============================================================================

# =============================================================================
# settings：框架自身设置（控制 code-to-skill 如何运行）
# =============================================================================

settings:
  # ── 模块 1：代码图谱与模块树 ──────────────────────────────
  code_graph:
    max_leaf_tokens: 8000
    max_module_depth: 3
    tokenizer: cl100k_base
    max_components_per_group: 200
    split_strategy: top_dir   # top_dir | package_path | file_then_function
    llm_clustering_enabled: false
    use_cache: true           # 增量解析 graph.db，二次运行跳过未变更文件
    # max_components_per_llm_call: 50   # reserved / design doc only — NOT wired in src

  # ── 模块 2：文档规范化 ────────────────────────────────────
  document_normalizer:
    max_chunk_tokens: 2000
    ocr_engine: tesseract
    ocr_languages: chi_sim+eng
    ocr_confidence_threshold: 0.6

  # ── 模块 3：SkillAtom 抽取 ───────────────────────────────
  atom_extractor:
    confidence_tier_1_max: 0.95
    llm_adjustment: 0.05
    max_source_refs_per_atom: 24

  # ── 模块 4：SkillOpt 优化 ──────────────────────────────────
  skillopt:
    use_llm_rollout: true     # 推荐 true；代码 runtime 默认 false（未设置时）
    rollout_backend: null     # 例: qwen-local — rollout 专用 backend（默认同 routes.target.primary）
    optimizer_backend: null   # 例: deepseek — reflect/select 专用（默认同 routes.optimizer.primary）
    judge_backend: null       # 例: deepseek — LLM Judge 专用（默认同 routes.judge.primary）
    num_epochs: 3
    batch_size: 20
    edit_budget: 3
    budget_strategy: cosine   # constant | cosine | linear
    gate_metric: soft         # hard（selection≥20）| mixed（5–19）| soft（<5）
    patience: 10
    accumulation: 1
    enable_slow_update: false
    enable_meta_skill: false
    slow_update_gate: true
    enable_code_tools: true
    max_tool_rounds: 5
    rollout_max_tool_rounds: 2
    rollout_workers: 4        # batch 内 item 并行 rollout（1=串行）
    expose_expected_checks_to_target: false
    # 全局 keyword / python_script scorer 别名；item 级 check_aliases 可追加
    check_aliases:
      资产: ["设备资产", "固定资产", "固定资产科目"]
      费用: ["Fee", "手续费", "费用收入", "fee"]
      Charge: ["Client charge", "Fee charge", "charge", "客户费用"]
    gate:
      strict_best_monotonic: true
      knowledge_updates_current_only: true
    finalize:
      export_current_on_tie: false
    quality_gate:
      enabled: true
      run_before_selection_eval: false
      run_after_selection_eval: true
      reject_on_leakage: true
      sanitize_then_reevaluate: true
      max_skill_tokens: 2000
      max_rules: 40
      leakage_patterns:
        - "expected_checks"
        - "verified checks"
        - "cover verified checks"
        - "benchmark case"
        - "scorer"
        - "校验程序"
        - "评分器"
      benchmark_id_patterns: []
    observability:
      write_selection_eval_report: true
      write_skill_quality_report: true
      write_gate_decision_report: true
      write_run_quality_report: true
    # 各阶段 LLM 输出 token 预算（须 ≤ backend.max_output_tokens）
    token_budgets:
      rollout: 8192
      reflect_failure: 16384
      reflect_success: 4096
      reflect_retry: [32768, 65536]
      select_edits: 4096
      judge: 4096
      aggregate: 4096
      slow_update: 4096
      meta_skill: 2048
      atom_extract: 8192

  # ── M4 Skill 自进化（settings.self_evolution，默认关闭）────
  self_evolution:
    enabled: false
    trace_pool:
      enabled: true
      min_support_count: 2
      cluster_by: ["task_type", "missed_checks", "context_refs"]
    proposals:
      include_success: true
      include_failure: true
      hierarchical_merge: true
      max_merge_fan_in: 8
      success_ignore_checks: []
      success_default_checks_text: "verified task-specific requirements"
      success_rule_tail: >-
        preserve the answer pattern that passed the checks, keep variable
        values grounded in the user input or provided context, and make the
        result directly verifiable
    gate:
      strict_improvement: true
      reject_ties: true
      allowed_regressions: 0
      frontier_enabled: false
      frontier_size: 3
    edits:
      max_edits_per_step: null   # null 表示使用 skillopt.edit_budget
      max_new_rules_per_step: 2
      max_skill_tokens: 2000
    hygiene:
      enabled: true
      run_each_epoch: true
      min_rule_use_count: 1
      max_rules: 40
    attribution:
      enabled: true
      inject_rule_ids: true
    knowledge:
      enabled: true
      gate_tolerance: 0.05
      min_support_count: 2

  # ── 流水线编排（M1–M4 产物契约与 skip 策略）────────────────
  pipeline:
    write_artifact_contract: true
    validate_context_refs: true
    run_atoms_when_benchmark_present: false
    run_docs_when_atoms_skipped: false
    merge_atom_seeds_into_benchmark: false
    append_atom_rules_to_skill: false
    bootstrap_min_confidence: 0.8
    use_evidence_index: true
    use_entrypoints: true
    use_role_index: true
    auto_plot_training_curve: true

  # ── 模块 5：模型与智能体交互 ──────────────────────────────
  # backend 由 type（高层类别）和 provider（具体实现）两个维度定义：
  #   type:     llm_api | local_llm | agent_cli | agent_service | mcp_agent | mock
  #   provider: openai_compatible | mock
  model_provider:
    backends:
      # 生产级 LLM（示例含全部可选 BackendConfig 字段及默认值）
      deepseek:
        type: llm_api
        provider: openai_compatible
        base_url: ${DEEPSEEK_BASE_URL}
        base_url_env: ""
        api_key_env: ${DEEPSEEK_API_KEY}
        api_key: ""
        model: deepseek-v4-pro
        context_window: 128000
        max_output_tokens: 16384
        timeout_seconds: 180
        command: ""
        profile: ""
        sandbox: ""
        workspace_required: false
        returns_trajectory: false
        fixture_dir: ""

      # 本地开发 LLM（vLLM / Ollama）
      qwen-local:
        type: local_llm
        provider: openai_compatible
        base_url: http://127.0.0.1:8000/v1
        api_key_env: LOCAL_LLM_API_KEY
        model: Qwen/Qwen3.5-4B
        context_window: 32768
        timeout_seconds: 120

      # 测试桩（离线 / CI / 无 API key 环境）
      mock-backend:
        type: mock
        provider: mock
        model: mock-model-v1

    # routes：按调用角色（role）选择 backend；primary 失败时按 fallback 顺序降级。
    # SkillOpt 训练可在 settings.skillopt 用 rollout_backend / optimizer_backend 覆盖 target / optimizer。
    routes:
      # M3 Atom 抽取：从代码片段与文档块中识别 SkillAtom（run extract-atoms）
      extractor:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
        strategy: fallback
        quorum: 2
        backends: []
      # M1 代码图谱：LLM 辅助模块聚类（code_graph.llm_clustering_enabled=true 时）
      clusterer:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      # M4 SkillOpt 优化器：reflect / select / aggregate / slow-update / meta-skill
      optimizer:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      # M4 SkillOpt 执行端（rollout）：benchmark 上跑当前 Skill 生成答案；selection/test gate 评估
      target:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      # 可选 LLM Judge 评分：benchmark scorer=llm_judge 时的 rubric 语义打分
      judge:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      # 预留：外部 Agent CLI / workspace 写操作类任务（当前流水线未默认启用）
      agent_worker:
        primary: deepseek
        fallback: [qwen-local, mock-backend]
      # 未匹配到具体 role 时的兜底路由
      default:
        primary: deepseek
        fallback: [qwen-local, mock-backend]

    policies:
      default_retries: 3
      retry_backoff: exponential
      trace_enabled: true
      cache_enabled: false
      redact_secrets: true
      max_cost_per_run_usd: 20
      max_timeout_seconds: 900
      structured_output_fallback: true

  # ── 输出与发布 ────────────────────────────────────────────
  output:
    root: runs/
    publish_target: ""

  # ── 审批策略 ──────────────────────────────────────────────
  approvals:
    require_for:
      - invoke_agent_cli_with_workspace_write
      - publish_skill
    auto_approve_in_batch: false

